# Minimal CI for the qwen crate.
#
# Restored after Codex adversarial-review round 4 flagged that Task 1's
# scaffold cleanup deleted the template-rs CI workflows and never
# replaced them, leaving sampler / parser / Cargo.lock changes to merge
# without an automated gate.
#
# The crate uses `mistralrs = "0.8"` with the `metal` feature, which
# is macOS-only. Running on Linux would require feature-gating per OS;
# until that's needed (the indexer is macOS-only today), CI is
# macOS-only too. The committed `Cargo.lock` makes builds reproducible
# on top of the unpinned manifest; cf. CONTRIBUTING.md for the
# mistralrs upgrade workflow.
#
# Gates (fast, no GPU required):
#   - `cargo fmt --check`              — style drift
#   - `cargo clippy --lib -- -D warnings` — lint regression
#   - `cargo test --lib`               — parser + accessor tests
#   - `cargo check --all-targets`      — ensures examples/ and the
#     non-integration tests compile against the public API.
#   - `cargo check --all-targets --features integration` — Codex
#     round 12 M2: without `--features integration`, the
#     `tests/integration_scene.rs` file (which has a crate-level
#     `#![cfg(feature = "integration")]`) compiles to nothing, so
#     accessor renames or signature drift in the integration test
#     could rot silently until a manual `QWEN_MODEL_PATH` run.
#     This step compiles it but does not execute it.
#
# What's intentionally NOT in CI:
#   - Running `tests/integration_scene.rs` against the real model
#     (requires the ~4 GiB qwen3-vl-2b model and `QWEN_MODEL_PATH`,
#     which GitHub-hosted runners don't have). Run locally before
#     merging changes that touch the engine or scene preset. CI
#     only typechecks the integration test, not its model run.
#   - Running the `examples/smoke.rs` binary. Same reason — CI
#     compiles it but does not execute it.
#
# Caching: cargo registry + target are cached by repo path + Cargo.lock
# hash. Cold runs compile mistralrs and friends (~10–15 min); warm runs
# are typically under 2 min.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt + clippy + lib tests
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy (lib + tests + examples)
        run: cargo clippy --lib --tests --examples --locked -- -D warnings

      - name: lib tests
        run: cargo test --lib --locked

      - name: typecheck all targets (examples + tests, no execution)
        run: cargo check --all-targets --locked

      - name: typecheck integration test (compile only, no model run)
        # Codex round 12 M2: tests/integration_scene.rs has
        # `#![cfg(feature = "integration")]`, so the previous
        # --all-targets step (no features) was compiling it to
        # nothing. This step compiles the integration test's actual
        # body so accessor renames / signature drift get caught in
        # CI, while leaving the real-model run gated on
        # `QWEN_MODEL_PATH` (not available on GitHub runners).
        run: cargo check --all-targets --features integration --locked
